<html>
    <head>
        <title>EmulatorJS | Netplay Server</title>
        <link rel="icon" type="image/png" href="img/icon.ico">
        <style>
            body {
                background-color: black;
                color: white;
                font-family: Arial, sans-serif;
            }

            .loading-screen {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                color: white;
                text-align: center;
                opacity: 1;
                transition: opacity 1s ease-in-out;
                z-index: 1;
            }

            .content {
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                opacity: 0;
                transition: opacity 1s ease-in-out;
                z-index: 2;
                text-align: center;
            }

            .loading-logo {
                width: 350px;
                height: 350px;
                filter: drop-shadow(0 0 20px white);
            }

            .logo {
                width: 200px;
                height: 200px;
                filter: drop-shadow(0 0 10px white);
            }

            .loading-text {
                font-size: 24px;
                filter: drop-shadow(0 0 10px white);
            }

            .button {
                background-color: #0098C5;
                color: #000;
                font-size: 18px;
                border: none;
                border-radius: 5px;
                padding: 5px 10px;
                cursor: pointer;
            }

            .button:hover {
                background-color: #006888;
            }

            #status,
            #nuser {
                margin: 10px 0;
            }

            .url-list {
                padding: 0;
                display: inline-block;
                text-align: left;
                margin: 0;
            }

            .url-list li {
                margin-bottom: 2px;
            }

            a {
                color: #0098C5;
                text-decoration: none;
            }

            a:hover {
                text-decoration: underline;
            }

            * {
                scrollbar-width: auto;
                scrollbar-color: #0097c5 #000000;
            }

            *::-webkit-scrollbar {
                width: 10px;
            }

            *::-webkit-scrollbar-track {
                background: #000000;
            }

            *::-webkit-scrollbar-thumb {
                background-color: #0097c5;
                border-radius: 10px;
                border: 0.5px solid #006888;
            }
            
            .netplay-test {
                margin-top: 30px;
                padding: 20px;
                border-top: 1px solid #333;
            }
            
            .netplay-test h2 {
                color: #0098C5;
            }
            
            .game-select {
                background: #1a1a1a;
                color: white;
                border: 1px solid #0098C5;
                border-radius: 5px;
                padding: 8px;
                margin: 10px;
            }
            
            .test-btn {
                background-color: #0098C5;
                color: black;
                border: none;
                border-radius: 5px;
                padding: 10px 20px;
                cursor: pointer;
                margin: 5px;
            }
            
            .test-btn:hover {
                background-color: #006888;
            }
            
            .emulator-container {
                margin-top: 20px;
                display: none;
            }
            
            canvas {
                border: 2px solid #0098C5;
                border-radius: 8px;
                background: #000;
            }
            
            .status {
                margin-top: 10px;
                padding: 10px;
                border-radius: 5px;
            }
            
            .status.online {
                color: #00ff00;
            }
            
            .status.offline {
                color: #ff0000;
            }
            
            .room-info {
                margin-top: 10px;
                padding: 10px;
                background: #1a1a1a;
                border-radius: 5px;
                display: none;
            }
        </style>
    </head>
    <body>
        <div id="loading" class="loading-screen">
            <img src="./img/logo-light.png" alt="Logo" class="loading-logo">
            <p class="loading-text">Loading Netplay Server...</p>
          </div>
        
          <div id="content" class="content">
            <h1>EmulatorJS Netplay Server</h1>
            <img src="img/logo-light.png" alt="Logo" class="logo">
            <p id="info">Server info</p>
            <button onclick="server()" id="server" class="button">Start Server</button>
            <p id="status"></p>
            <p id="nuser"></p>
            <p>URL's to use with EmulatorJS Netplay: <ul id="urls" class="url-list"></ul></p>
            
            <!-- Netplay Test Section -->
            <div class="netplay-test">
                <h2>🎮 Test Netplay</h2>
                <p>Select a game and click "Launch" to test netplay (uses nightly CDN)</p>
                <select id="gameSelect" class="game-select">
                    <option value="mario_party_3">🎲 Mario Party 3</option>
                    <option value="pokemon_stadium">⚡ Pokémon Stadium</option>
                    <option value="mario_kart_64">🏎️ Mario Kart 64</option>
                </select>
                <button onclick="launchEmulator()" class="test-btn">🚀 Launch Game</button>
                <div id="emulatorContainer" class="emulator-container">
                    <canvas id="gameCanvas"></canvas>
                    <div id="roomInfo" class="room-info"></div>
                </div>
            </div>
            
            <p><a href="https://github.com/EmulatorJS/EmulatorJS-Netplay" target="_blank" class="github-link">View on GitHub</a></p>
            <p>Licensed under the Apache License 2.0 - Read the license <a href="https://github.com/EmulatorJS/EmulatorJS-Netplay/blob/main/LICENSE" target="_blank" class="license-link">here</a></p>
            <br>
          </div>
        <script>
            // ===== GAME ROMS =====
            // Replace these with your actual ROM URLs
            const GAME_ROMS = {
                mario_party_3: {
                    name: 'Mario Party 3',
                    core: 'n64',
                    url: 'https://github.com/ChipikiPal800/fanter.os/releases/download/v1.0/Mario.Party.3.NA.z64'
                },
                pokemon_stadium: {
                    name: 'Pokémon Stadium',
                    core: 'n64',
                    url: ''
                },
                mario_kart_64: {
                    name: 'Mario Kart 64',
                    core: 'n64',
                    url: ''
                }
            };
            
            // Netplay server URL (your Render server URL - update this!)
            const NETPLAY_SERVER_URL = window.location.origin;
            
            // Configure EmulatorJS for netplay
            let emulatorLaunched = false;
            
            function launchEmulator() {
                const gameSelect = document.getElementById('gameSelect');
                const selectedGame = gameSelect.value;
                const game = GAME_ROMS[selectedGame];
                
                if (!game || !game.url) {
                    alert('Please add ROM URL for this game in the GAME_ROMS object');
                    return;
                }
                
                const container = document.getElementById('emulatorContainer');
                const canvas = document.getElementById('gameCanvas');
                const roomInfo = document.getElementById('roomInfo');
                
                container.style.display = 'block';
                
                // Clear previous emulator
                if (window.EJS_emulator) {
                    try { window.EJS_emulator.destroy(); } catch(e) {}
                    window.EJS_emulator = null;
                }
                
                // Remove old script
                const oldScript = document.querySelector('script[src*="emulatorjs"]');
                if (oldScript) oldScript.remove();
                
                // ===== NETPLAY CONFIGURATION (CRITICAL) =====
                window.EJS_netplayUrl = NETPLAY_SERVER_URL;
                window.EJS_gameID = 1; // Unique ID for this game
                
                // ===== EMULATOR CONFIGURATION =====
                window.EJS_player = '#gameCanvas';
                window.EJS_core = game.core;
                window.EJS_gameName = game.name;
                window.EJS_gameUrl = game.url;
                window.EJS_pathtodata = 'https://cdn.emulatorjs.org/nightly/data/'; // NIGHTLY CDN!
                window.EJS_startOnLoaded = true;
                
                // Fixes for black screen and audio
                window.EJS_DEBUG_XX = true;
                window.EJS_ignoreGamepad = true;
                window.EJS_WebGL2 = false;
                window.EJS_recanvas = true;
                window.EJS_video = 'webgl1';
                window.EJS_audio_sampling_rate = 44100;
                window.EJS_audio_latency = 256;
                
                // N64 specific
                if (game.core === 'n64') {
                    window.EJS_coreOptions = {
                        'retroarch_core': 'mupen64plus_next'
                    };
                }
                
                // Show buttons for netplay
                window.EJS_buttons = {
                    playPause: true,
                    restart: true,
                    mute: true,
                    settings: true,
                    fullscreen: true,
                    saveState: true,
                    loadState: true,
                    screenRecord: true,
                    netplay: true  // Explicitly enable netplay button
                };
                
                // Load EmulatorJS from nightly CDN
                const script = document.createElement('script');
                script.src = 'https://cdn.emulatorjs.org/nightly/data/loader.js';
                script.onload = () => {
                    console.log('✅ EmulatorJS (nightly) loaded');
                    roomInfo.innerHTML = `
                        <strong>Netplay Ready!</strong><br>
                        Look for the 🌐 icon in the emulator toolbar.<br>
                        Host: Create a room → Share the code<br>
                        Guest: Join room → Enter the code
                    `;
                    roomInfo.style.display = 'block';
                    emulatorLaunched = true;
                };
                script.onerror = () => {
                    console.error('❌ Failed to load EmulatorJS');
                    roomInfo.innerHTML = '<span style="color: red;">Failed to load emulator. Check console.</span>';
                };
                document.body.appendChild(script);
            }
            
            const startstop = document.getElementById('server');
            window.addEventListener("load", function() {
                const loadingScreen = document.getElementById("loading");
                const content = document.getElementById("content");
                setTimeout(function() {
                    loadingScreen.style.opacity = 0;
                    content.style.opacity = 1;
                }, 1000);
                setTimeout(function() {
                    loadingScreen.remove();
                }, 2000);
            });

            (function() {
                check();
                api("interface").then(address => {
                    if(window.location.port != ""){
                        address.interfaces.push(window.location.protocol+"//"+window.location.hostname+':'+window.location.port+'/');
                    }else{
                        address.interfaces.push(window.location.protocol+"//"+window.location.hostname+'/');
                    }
                    address.interfaces = [...new Set(address.interfaces)];
                    address.interfaces.forEach(address => {
                        document.getElementById('urls').innerHTML += '<li><a href="'+address+'" target="_blank" onclick="window.api.openExternal(this.href);event.preventDefault()">'+address+'</a></li>';
                    });
                });
                statuscheck();
            })();
            function api(type) {
                return fetch('/api', {
                    method: 'POST',
                    body: JSON.stringify({
                        function: type,
                    }),
                    headers: {
                    'Content-Type': 'application/json'
                    }
                })
                .then(response => response.json())
                .then(data => {
                    return data;
                });
            }
            function check(){
                api("check").then(status => {
                    if(status == true){
                        startstop.innerText = 'Stop';
                    }else if(status == false){
                        startstop.innerText = 'Start';
                    }
                    update();
                });
            }
            function update(){
                if(startstop.textContent == "Start"){
                    document.getElementById('status').style.color = "red";
                    document.getElementById('status').innerText = 'NOT RUNNING';
                }else if(startstop.textContent == "Stop"){
                    document.getElementById('status').style.color = "green";
                    document.getElementById('status').innerText = 'RUNNING';
                }else{
                    console.error("Error!");	
                }
            }
            function server(){
                if (startstop.textContent === 'Start'){
                    startstopserver("start");
                }else if(startstop.textContent === 'Stop'){
                    startstopserver("stop");
                }
                update();
            }
            function startstopserver(option){
                api(option).then(data => {
                    if(option == "start"){
                        if(data == true){
                            startstop.innerText = 'Stop'; 
                        }else{
                            console.error("There was error starting the server!");
                        }	
                    }else if(option == "stop"){
                        if(data == true){
                            startstop.innerText = 'Start'; 
                        }else{
                            console.error("There was error stoping the server!");
                        }
                    }else{
                        console.error("Error!");	
                    }
                    check();
                });
            }
            setInterval(function(){ 
                statuscheck();
            }, 5000);
            function statuscheck(){
                api("status").then(data => {
                    if(data.status == true){
                        startstop.innerText = 'Stop';
                    }else if(data.status == false){
                        startstop.innerText = 'Start';
                    }
                    document.getElementById('nuser').innerHTML = "Users connected: "+data.nofusers;
                    document.getElementById('info').innerHTML = "Running server on port " + (data.port || 3000) + " with password " + data.password;
                    update();
                });
            }
        </script>
    </body>
</html>
